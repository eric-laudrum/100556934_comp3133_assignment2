<!-- Employee List -->

<div class="list-container">
    <div class="header-section">
        <h2>Employee Management</h2>

        <div class="header-actions">
            <button class="add-btn" (click)="navigateToAdd()">+ Add Employee</button>
            <button class="logout-btn" (click)="logout()">Logout</button>
        </div>
    </div>
    

    <table>
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        @for (emp of employees(); track emp._id) {
            <tr>
                <td>{{ emp.first_name }}</td>
                <td>{{ emp.last_name }}</td>
                <td>{{ emp.email }}</td>
                <td>{{ emp.department }}</td>
                <td>
                    <button class="form-btn" (click)="viewDetails(emp._id)">View</button>
                    <button class="form-btn" (click)="editEmployee(emp._id)">Edit</button>
                    <button class="form-btn" (click)="deleteEmployee(emp._id)">Delete</button>
                </td>
            </tr>
         } @empty {

        <tr>
            <td colspan="5"
            >No employees found.</td>
        </tr>

    }

    </tbody>
  </table>
</div>
