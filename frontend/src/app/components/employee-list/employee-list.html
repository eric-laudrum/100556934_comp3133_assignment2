<!-- Employee List -->

<div>
    <div>
        <h2>Employee Management</h2>

        <button class="add-btn" (click)="navigateToAdd()">+Add Employee</button>
    </div>
    

    <table>
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        @for (emp of employees; track emp.id) {
        <tr>
            <td>{{ emp.first_name }}</td>
            <td>{{ emp.last_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.department }}</td>
            <td>
            <button class="form-btn" (click)="viewDetails(emp.id)">View</button>
            <button class="form-btn" (click)="editEmployee(emp.id)">Edit</button>
            <button class="form-btn" (click)="deleteEmployee(emp.id)">Delete</button>
            </td>
        </tr>
    } @empty {

        <tr>
            <td colspan="5" class="text-center">No employees found.</td>
        </tr>

    }

    </tbody>
  </table>
</div>
